version: 2
updates:
  # Python dependencies (pip)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
    groups:
      pytorch:
        patterns:
          - "torch*"
          - "onnx*"
      qt:
        patterns:
          - "PySide6"
          - "pyqtgraph"
      dicom:
        patterns:
          - "pydicom"
          - "pylibjpeg*"
          - "pynetdicom"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
