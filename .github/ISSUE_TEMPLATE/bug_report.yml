name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Open DICOM file
        2. Click on 'Measure'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 10
        - Windows 11
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Linux (Ubuntu/Debian)
        - Linux (other)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: SonoForge version
      description: "Output from Help > About, or the version from the exe filename."
      placeholder: "e.g. 0.2.2"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: "If applicable, paste log output. Run with `ECHO_DEBUG=1` for verbose logs."
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or DICOM files about the problem here.
