name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "Features"
    labels:
      - "feature"
      - "enhancement"
      - "feat"
  - title: "Bug Fixes"
    labels:
      - "fix"
      - "bugfix"
      - "bug"
  - title: "Maintenance"
    labels:
      - "chore"
      - "deps"
      - "dependencies"
      - "refactor"
      - "style"
  - title: "Documentation"
    labels:
      - "docs"
      - "documentation"
  - title: "CI/CD"
    labels:
      - "ci"
      - "cd"
      - "build"

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'

no-changes-template: "No changes since last release."

version-resolver:
  major:
    labels:
      - "major"
  minor:
    labels:
      - "minor"
      - "feature"
      - "enhancement"
  patch:
    labels:
      - "patch"
      - "fix"
      - "bugfix"
      - "bug"
      - "chore"
      - "deps"
      - "dependencies"
      - "refactor"
      - "style"
      - "docs"
      - "ci"
      - "cd"
      - "build"
  default: patch

autolabeler:
  - label: "chore"
    title:
      - '/^chore/i'
  - label: "fix"
    title:
      - '/^fix/i'
  - label: "feature"
    title:
      - '/^feat/i'
  - label: "docs"
    title:
      - '/^docs/i'
  - label: "ci"
    title:
      - '/^ci/i'
  - label: "deps"
    title:
      - '/^bump/i'
      - '/^deps/i'
      - '/^dependency/i'

template: |
  ## Changes

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

contributors: |
  Thanks to all contributors who helped with this release!
