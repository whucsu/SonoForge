name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install pytest-benchmark

      - name: Run benchmarks
        run: |
          pytest tests/benchmark/ --benchmark-json=benchmark-results.json --benchmark-save=latest -q 2>&1 || true
          # Create results dir if no benchmark tests exist yet
          mkdir -p benchmarks

      - name: Store benchmark results
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: SonoForge Benchmarks
          tool: 'pytest'
          output-file-path: benchmark-results.json
          auto-push: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          benchmark-data-dir-path: benchmarks
          alert-threshold: '150%'
          fail-on-alert: false
          summary-always: true

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: SonoForge Benchmarks
          tool: 'pytest'
          output-file-path: benchmark-results.json
          auto-push: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          alert-threshold: '150%'
          fail-on-alert: false
          summary-always: true
          comment-on-alert: true
