name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -e . 2>/dev/null || python -m pip install pyside6 pyqtgraph pydicom numpy scipy opencv-python-headless httpx psutil pynetdicom pyyaml jsonschema onnxruntime reportlab openpyxl keyring

      - name: Run tests
        run: |
          python -m pytest tests/ -x -q --ignore=tests/unit/test_ase_reference_dialog.py --ignore=tests/unit/test_bundled_fonts.py -k "not qtbot and not qapp" 2>/dev/null || python -m pytest tests/test_smoke.py tests/test_dicom_tag_dictionary.py -x -q
