name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.1)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev librsvg2-bin

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "." 2>/dev/null || python -m pip install pyside6 pyqtgraph pydicom numpy scipy opencv-python-headless httpx psutil pynetdicom pyyaml jsonschema onnxruntime reportlab openpyxl keyring

      - name: Run smoke tests
        run: |
          python -c "
          import PySide6, pydicom, numpy, scipy
          print(f'PySide6: {PySide6.__version__}')
          print(f'numpy: {numpy.__version__}')
          print('Dependencies OK')
          "

      - name: Build .deb (lite)
        run: ./build/linux/build-lite.sh

      - name: Verify .deb
        run: |
          DEB=$(ls dist/sonoforge_*.deb)
          echo "Package: $DEB"
          echo "Size: $(du -h "$DEB" | cut -f1)"
          dpkg-deb --info "$DEB"
          dpkg-deb --contents "$DEB" | head -20

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: sonoforge-deb
          path: dist/sonoforge_*.deb

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "." 2>$null
          if ($LASTEXITCODE -ne 0) {
            python -m pip install pyside6 pyqtgraph pydicom pylibjpeg pylibjpeg-openjpeg pylibjpeg-libjpeg "numpy<2" scipy opencv-python-headless httpx psutil pymupdf pynetdicom pyyaml jsonschema onnxruntime reportlab openpyxl keyring
          }

      - name: Run smoke tests
        run: |
          python -c "
          import PySide6, pydicom, numpy, scipy
          print(f'PySide6: {PySide6.__version__}')
          print(f'numpy: {numpy.__version__}')
          print('Dependencies OK')
          "

      - name: Build standalone exe
        run: |
          python -m pip install pyinstaller
          python -m PyInstaller sonoforge-standalone.spec --noconfirm --clean

      - name: Verify exe
        run: |
          $exe = Get-Item dist\SonoForge.exe
          Write-Host "Exe: $($exe.FullName)"
          Write-Host "Size: $([math]::Round($exe.Length / 1MB, 1)) MB"

      - name: Upload standalone exe
        uses: actions/upload-artifact@v7
        with:
          name: sonoforge-windows-exe
          path: dist\SonoForge.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.ref_name }}" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(git ls-remote --tags origin 'refs/tags/v*' | sort -t/ -k3 -V | tail -1 | sed 's|.*refs/tags/||')
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: sonoforge-deb

      - name: Download Windows exe
        uses: actions/download-artifact@v8
        with:
          name: sonoforge-windows-exe

      - name: List downloaded files
        run: ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: |
            sonoforge_*.deb
            SonoForge.exe
          generate_release_notes: true
          draft: false
          prerelease: false
