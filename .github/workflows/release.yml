name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev librsvg2-bin

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "." 2>/dev/null || python -m pip install pyside6 pyqtgraph pydicom numpy scipy opencv-python-headless httpx psutil pynetdicom pyyaml jsonschema onnxruntime reportlab openpyxl keyring

      - name: Run smoke tests
        run: |
          python -c "
          import PySide6, pydicom, numpy, scipy
          print(f'PySide6: {PySide6.__version__}')
          print(f'numpy: {numpy.__version__}')
          print('Dependencies OK')
          "

      - name: Build .deb (lite)
        run: ./build/linux/build-lite.sh

      - name: Verify .deb
        run: |
          DEB=$(ls dist/sonoforge_*.deb)
          echo "Package: $DEB"
          echo "Size: $(du -h "$DEB" | cut -f1)"
          dpkg-deb --info "$DEB"
          dpkg-deb --contents "$DEB" | head -20

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonoforge-deb
          path: dist/sonoforge_*.deb

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "." 2>$null; if ($LASTEXITCODE -ne 0) { python -m pip install pyside6 pyqtgraph pydicom pylibjpeg pylibjpeg-openjpeg pylibjpeg-libjpeg "numpy<2" scipy opencv-python-headless httpx psutil pymupdf pynetdicom pyyaml jsonschema onnxruntime reportlab openpyxl keyring }

      - name: Run smoke tests
        run: |
          python -c "
          import PySide6, pydicom, numpy, scipy
          print(f'PySide6: {PySide6.__version__}')
          print(f'numpy: {numpy.__version__}')
          print('Dependencies OK')
          "

      - name: Build lightweight package
        run: build\windows\build-lite.bat

      - name: Build self-extracting installer
        run: |
          python -m pip install pyinstaller
          python -m PyInstaller --onefile --name SonoForgeLauncher --console --clean launcher.py
          python scripts/create_installer.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sonoforge-windows
          path: |
            dist/SonoForge-*.zip
            dist/SonoForge-Setup.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: sonoforge-deb

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: sonoforge-windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sonoforge_*.deb
            SonoForge-*.zip
            SonoForge-Setup.exe
          generate_release_notes: true
          draft: false
          prerelease: false
